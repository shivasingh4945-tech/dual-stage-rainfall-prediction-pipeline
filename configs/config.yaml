# ============================================================
#  Rainfall Prediction — Uttar Pradesh
#  Central Configuration File
# ============================================================

# ── Paths ────────────────────────────────────────────────────
paths:
  raw_era5:      data/raw/era5_district_daily_2017_2025.csv
  raw_nasa:      data/raw/nasa_power_combined.csv
  raw_coords:    data/raw/district_coordinates.csv
  processed:     data/processed/merged_processed.csv
  train:         data/splits/train.csv
  val:           data/splits/val.csv
  test:          data/splits/test.csv
  model_clf:     models/classifier_xgb.pkl
  model_reg:     models/regressor_xgb.pkl
  scaler:        models/scaler.pkl
  encoder:       models/encoder.pkl
  plots:         outputs/plots/
  reports:       outputs/reports/
  predictions:   outputs/predictions.csv

# ── Target Definition ────────────────────────────────────────
target:
  regression_col:      PRECTOTCORR           # NASA POWER — realistic mm/day
  classification_col:  rain_today            # Derived: PRECTOTCORR > threshold
  rain_threshold_mm:   2.5                   # IMD standard rainy day definition
  log_transform:       true                  # Log1p transform for regression target

# ── Train / Val / Test Split ─────────────────────────────────
# Temporal split — no shuffling to prevent data leakage
split:
  train_end:  "2022-12-31"
  val_end:    "2023-12-31"
  # test = 2024-01-01 onwards (2024 + 2025)

# ── Features ─────────────────────────────────────────────────
features:
  # From ERA5 (after unit conversion)
  era5:
    - t2m        # Temperature 2m (converted K → °C)
    - d2m        # Dewpoint 2m   (converted K → °C)
    - sp         # Surface pressure (converted Pa → hPa)
    - u10        # U-wind 10m (m/s)
    - v10        # V-wind 10m (m/s)

  # From NASA POWER
  nasa:
    - RH2M       # Relative humidity 2m (%)
    - WS10M      # Wind speed 10m (m/s)
    - WS50M      # Wind speed 50m (m/s) — exclusive to NASA
    - WD10M      # Wind direction 10m (°) — encode as sin/cos
    - WD50M      # Wind direction 50m (°) — encode as sin/cos

  # Spatial
  spatial:
    - latitude
    - longitude

  # Engineered (created in features.py)
  engineered:
    - month_sin
    - month_cos
    - season_encoded
    - wind_speed_10m      # sqrt(u10^2 + v10^2)
    - wind_dir_sin        # sin of ERA5 wind direction
    - wind_dir_cos        # cos of ERA5 wind direction
    - wd10m_sin           # sin(WD10M)
    - wd10m_cos           # cos(WD10M)
    - wd50m_sin           # sin(WD50M)
    - wd50m_cos           # cos(WD50M)
    - tdd                 # Temperature-Dewpoint Depression (T - Td)
    - humidity_stress     # RH2M / (tdd + 0.1)
    - precip_lag_1d       # NASA precip lagged 1 day
    - precip_lag_3d       # NASA precip lagged 3 days
    - precip_lag_7d       # NASA precip lagged 7 days
    - precip_roll_7d      # 7-day rolling mean
    - precip_roll_30d     # 30-day rolling mean
    - day_of_year
    - rain_streak         # Consecutive rainy-day count (persistence signal)

  # Columns to DROP before modelling
  drop:
    - district            # Encoded separately or used for groupby
    - date
    - tp                  # ERA5 precip — unreliable, replaced by NASA
    - PRECTOTCORR         # Target — must not be a feature
    - T2MDEW              # NASA dewpoint — use ERA5 d2m (more reliable)
    - PS                  # NASA pressure — use ERA5 sp (more reliable)
    - WD10M               # Raw degrees — replaced by sin/cos encoding
    - WD50M               # Raw degrees — replaced by sin/cos encoding

# ── Preprocessing ────────────────────────────────────────────
preprocessing:
  nasa_precip_winsorize_pct: 99     # Cap PRECTOTCORR at 99th percentile
  outlier_method: winsorize         # winsorize | clip | none
  scaler: robust                    # robust | standard | minmax
  drop_kanpur_duplicate: true       # Drop 'kanpur', keep 'kanpur_nagar'

# ── Class Imbalance ──────────────────────────────────────────
imbalance:
  method: smote                     # smote | class_weight | none
  smote_k_neighbors: 5
  apply_on: train_only              # NEVER apply to val or test

# ── XGBoost Classifier ───────────────────────────────────────
xgb_classifier:
  n_estimators: 500
  max_depth: 7
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  gamma: 0.1
  reg_alpha: 0.1
  reg_lambda: 1.0
  scale_pos_weight: 3.13            # ~imbalance ratio (no rain / rain)
  eval_metric: auc
  random_state: 42
  n_jobs: -1

# ── XGBoost Regressor ────────────────────────────────────────
xgb_regressor:
  n_estimators: 500
  max_depth: 7
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  gamma: 0.1
  reg_alpha: 0.1
  reg_lambda: 1.0
  objective: reg:squarederror
  random_state: 42
  n_jobs: -1

# ── LightGBM Regressor (backup/ensemble) ────────────────────
lgbm_regressor:
  n_estimators: 500
  max_depth: 7
  learning_rate: 0.05
  num_leaves: 63
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_samples: 20
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1

# ── Optuna Hyperparameter Tuning ─────────────────────────────
optuna:
  n_trials: 50
  timeout_seconds: 3600
  metric_classifier: roc_auc
  metric_regressor: rmse
  direction_classifier: maximize
  direction_regressor: minimize

# ── Evaluation Metrics ───────────────────────────────────────
evaluation:
  classifier:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
    - average_precision
  regressor:
    - rmse
    - mae
    - r2
    - mape

# ── Visualization ────────────────────────────────────────────
viz:
  dpi: 150
  figsize_default: [12, 5]
  style: dark_background
  palette_main: "#4fc3f7"
  palette_accent: "#ff9800"
  palette_danger: "#ef5350"
  palette_success: "#4caf50"
  save_format: png
